<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모의고사 영단어 퀴즈</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const VOCAB_DATA = {
          "2026년 3월": {
            18: [
              { word: "appreciate", meaning: "감사하다", distractors: ["사과하다", "비판하다"] },
              { word: "continued", meaning: "지속적인", distractors: ["일시적인", "간헐적인"] },
              { word: "conducting", meaning: "수행하는", distractors: ["포기하는", "방해하는"] },
              { word: "essential", meaning: "필수적인", distractors: ["선택적인", "사소한"] }
            ],
            "41-42": [
              { word: "emergence", meaning: "출현", distractors: ["소멸", "유지"] },
              { word: "datasets", meaning: "데이터셋", distractors: ["알고리즘", "모델"] },
              { word: "visualizing", meaning: "시각화하는", distractors: ["분석하는", "저장하는"] },
              { word: "numerical", meaning: "수치의", distractors: ["질적인", "언어적인"] },
              { word: "statistics", meaning: "통계", distractors: ["수학", "물리"] },
              { word: "forefront", meaning: "최전선", distractors: ["후방", "중심"] },
              { word: "conventions", meaning: "관습", distractors: ["법칙", "규정"] },
              { word: "sophisticated", meaning: "정교한", distractors: ["단순한", "조잡한"] },
              { word: "interpretation", meaning: "해석", distractors: ["측정", "추정"] }
            ]
          }
        };

        function VocabQuiz() {
            const [step, setStep] = React.useState('select');
            const [selectedNo, setSelectedNo] = React.useState('');
            const [currentIdx, setCurrentIdx] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [wrongAnswers, setWrongAnswers] = React.useState([]);

            const quizData = VOCAB_DATA["2026년 3월"];
            const currentWords = quizData[selectedNo] || [];
            const currentQuestion = currentWords[currentIdx];

            const options = React.useMemo(() => {
                if (!currentQuestion) return [];
                return [currentQuestion.meaning, ...currentQuestion.distractors].sort(() => Math.random() - 0.5);
            }, [currentIdx, selectedNo]);

            const startQuiz = (no) => {
                setSelectedNo(no);
                setCurrentIdx(0);
                setScore(0);
                setWrongAnswers([]);
                setStep('quiz');
            };

            const handleAnswer = (selected) => {
                if (selected === currentQuestion.meaning) {
                    setScore(prev => prev + 1);
                } else {
                    setWrongAnswers(prev => [...prev, {
                        word: currentQuestion.word,
                        correct: currentQuestion.meaning,
                        chosen: selected
                    }]);
                }

                if (currentIdx + 1 < currentWords.length) {
                    setCurrentIdx(prev => prev + 1);
                } else {
                    setStep('result');
                }
            };

            if (step === 'select') {
                return (
                    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
                        <h1 class="text-2xl font-black text-center mb-6 text-indigo-400">📝 모의고사 영단어 퀴즈</h1>
                        <p class="text-sm text-slate-400 text-center mb-6">원하는 지문 번호를 선택하여 퀴즈를 시작하세요!</p>
                        <div class="grid grid-cols-2 gap-4">
                            {Object.keys(quizData).map(no => (
                                <button key={no} onClick={() => startQuiz(no)} class="py-4 bg-slate-700 hover:bg-indigo-600 rounded-xl font-bold transition text-lg shadow-md">
                                    {no}번 지문
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (step === 'quiz') {
                return (
                    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
                        <div class="flex justify-between text-xs text-slate-400 mb-4 font-semibold">
                            <span>지문: {selectedNo}번</span>
                            <span>{currentIdx + 1} / {currentWords.length} 문제</span>
                        </div>
                        <div class="text-center my-10">
                            <h2 class="text-4xl font-extrabold tracking-wide text-indigo-300">{currentQuestion?.word}</h2>
                        </div>
                        <div class="space-y-3">
                            {options.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(opt)} class="w-full py-4 px-5 text-left bg-slate-700 hover:bg-slate-600 active:bg-indigo-900 rounded-xl font-medium transition border border-slate-600 hover:border-indigo-500">
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
                    <h2 class="text-3xl font-black text-center mb-2 text-emerald-400">🎉 테스트 완료!</h2>
                    <p class="text-center text-slate-400 mb-6">결과를 확인하고 오답을 복습해 보세요.</p>
                    
                    <div class="bg-slate-900 p-4 rounded-xl text-center mb-6 border border-slate-700">
                        <span class="text-sm text-slate-400 block mb-1">최종 점수</span>
                        <span class="text-3xl font-black text-indigo-400">{score}</span>
                        <span class="text-slate-500 font-bold"> / {currentWords.length}</span>
                    </div>

                    {wrongAnswers.length > 0 && (
                        <div class="mb-6">
                            <h3 class="text-sm font-bold text-rose-400 mb-2">❌ 오답 다시보기</h3>
                            <div class="space-y-2 max-h-48 overflow-y-auto pr-1">
                                {wrongAnswers.map((w, i) => (
                                    <div key={i} class="bg-slate-700/50 p-3 rounded-lg text-xs border border-slate-700">
                                        <div class="font-bold text-slate-200 text-sm mb-1">{w.word}</div>
                                        <div class="text-slate-400">내가 고른 뜻: <span class="text-rose-400 line-through">{w.chosen}</span></div>
                                        <div class="text-slate-300 font-semibold">올바른 뜻: <span class="text-emerald-400">{w.correct}</span></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <button onClick={() => setStep('select')} class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-black transition shadow-lg">
                        메인으로 돌아가기
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VocabQuiz />);
    </script>
</body>
</html>
